# Format + lint staged files before commit.
#
# One-time setup:   pip install pre-commit && pre-commit install
# Run on everything: pre-commit run --all-files
#
# This is fast local feedback, NOT the enforcement gate — CI
# (.github/workflows/lint.yml) runs the same hooks and is the source of truth.
# Bypass in a pinch with: git commit --no-verify
repos:
  # Python: api/ and worker/ (ruff is pinned + isolated by pre-commit, independent
  # of any local venv). worker/.ruff.toml applies its stricter rules to worker files.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
        files: ^(api|worker)/.*\.py$
      - id: ruff-format
        files: ^(api|worker)/.*\.py$

  # Web: reuse the project's own eslint/prettier from web/node_modules so versions
  # and config (web/eslint.config.js) stay in one place. Requires `npm ci` in web/.
  - repo: local
    hooks:
      - id: prettier
        name: prettier (web)
        entry: web/node_modules/.bin/prettier --write --ignore-unknown
        language: system
        files: ^web/
        exclude: (/(dist|node_modules)/|package-lock\.json$)
      - id: eslint
        name: eslint (web)
        entry: web/node_modules/.bin/eslint --config web/eslint.config.js --fix
        language: system
        files: ^web/.*\.(ts|tsx)$
        exclude: /(dist|node_modules)/

  # Cheap, non-mutating safety net.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
