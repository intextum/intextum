[mypy]
python_version = 3.12
explicit_package_bases = True
mypy_path = worker/src
files = worker/src/intextum_worker/config.py, worker/src/intextum_worker/logging_config.py, worker/src/intextum_worker/main.py, worker/src/intextum_worker/models.py, worker/src/intextum_worker/poll_loop.py, worker/src/intextum_worker/processors.py, worker/src/intextum_worker/services
follow_imports = skip
ignore_missing_imports = True
check_untyped_defs = True
no_implicit_optional = True
warn_unused_ignores = True
